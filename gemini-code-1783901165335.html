<!DOCTYPE html>
<html lang="hu" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angol Beszéd Teszt</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-full flex flex-col transition-colors duration-300">

  <header class="border-b border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-950 py-4 px-6 sticky top-0 z-10 shadow-sm">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="tanulo_kartyak.html" class="text-xs bg-slate-100 dark:bg-slate-800 text-slate-500 px-3 py-2 rounded-xl font-bold">❮ Vissza</a>
        <span class="text-lg font-bold tracking-wide text-slate-800 dark:text-white">Pacek Beszéd Teszt</span>
      </div>
      <button id="themeToggle" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition">🌓</button>
    </div>
  </header>

  <main class="flex-1 max-w-2xl w-full mx-auto p-4 md:p-6 flex flex-col justify-center items-center gap-6">
    
    <div class="w-full flex justify-between items-center text-sm font-bold text-slate-400">
      <span id="questionProgress">1 / 12 Mondat</span>
      <span id="flaggedCountDisplay" class="text-amber-600 dark:text-amber-400 font-medium hidden">Ismétlendő: 0</span>
    </div>

    <div id="quizBox" class="w-full bg-white dark:bg-slate-800 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-700/60 p-8 md:p-12 flex flex-col justify-between min-h-[320px] transition-all relative overflow-hidden cursor-pointer" onclick="revealAnswer()">
      
      <div class="flex-1 flex flex-col justify-center space-y-6 my-auto text-center">
        <div>
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Magyarul:</p>
          <p id="quizHungarian" class="text-xl md:text-2xl font-medium text-slate-800 dark:text-slate-200 leading-normal"></p>
        </div>

        <div id="cardDivider" style="display: none;" class="w-full border-t border-slate-100 dark:border-slate-700/60 my-2"></div>

        <div id="englishContainer" style="display: none;">
          <p class="text-xs font-semibold text-brand-500 uppercase tracking-wider mb-2">Angolul (Pacekba):</p>
          <p id="quizEnglish" class="text-2xl md:text-3xl font-bold tracking-tight text-slate-950 dark:text-white leading-relaxed"></p>
        </div>
        
        <p id="tapToRevealText" class="text-xs text-slate-400 animate-pulse pt-4">Mondd ki hangosan, majd KATTINTS A KÁRTYÁRA az ellenőrzéshez!</p>
      </div>
    </div>

    <div id="actionRow" style="display: none;" class="flex items-center gap-3 w-full max-w-2xl">
      <button onclick="handleFeedback(true)" class="flex-1 py-4 rounded-xl border border-amber-400/60 bg-amber-50/40 dark:bg-amber-950/20 text-amber-700 dark:text-amber-400 font-bold text-sm shadow-sm transition-all flex items-center justify-center gap-1.5 active:scale-95">
        ⚠️ Döcögős / Ismételjük
      </button>
      
      <button onclick="handleFeedback(false)" class="flex-[2] py-4 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-sm shadow-md transition-all flex items-center justify-center gap-1.5 active:scale-95">
        ✅ Simán ment ➔
      </button>
    </div>

    <div id="resultBox" class="w-full bg-white dark:bg-slate-800 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-700/60 p-8 text-center hidden flex-col items-center gap-5">
      <span class="text-5xl">🏆</span>
      <h2 class="text-2xl font-black">Beszéd teszt kész!</h2>
      <p id="finalScoreText" class="text-base text-slate-600 dark:text-slate-300"></p>
      
      <div class="flex flex-col sm:flex-row gap-3 w-full pt-4 border-t border-slate-100 dark:border-slate-700">
        <button onclick="restartQuiz(false)" class="flex-1 px-6 py-3.5 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 text-slate-700 dark:text-white font-bold rounded-xl transition active:scale-95">
          Összes újrakezdése 🔄
        </button>
        <button id="reviewFlaggedBtn" onclick="restartQuiz(true)" class="flex-1 px-6 py-3.5 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-xl transition shadow-md hidden active:scale-95">
          Csak a döcögősek (0) 🎯
        </button>
      </div>
    </div>

  </main>

  <script>
    const cards = [
      { keyword: "unwell", english: "I am terribly **unwell** tonight.", hungarian: "Szörnyen rosszul vagyok ma éjjel." },
      { keyword: "suffer from", english: "I **suffer from** a secret thing.", hungarian: "Egy titkos dologban szenvedek." },
      { keyword: "heart attack", english: "I think I have a **heart attack**.", hungarian: "Azt hiszem, szívrohamom van." },
      { keyword: "unhealthy", english: "My lifestyle is very **unhealthy**.", hungarian: "Az életmódom nagyon egészségtelen." },
      { keyword: "cancer", english: "This nasty **cancer** is inside.", hungarian: "Ez a félelmetes rák van odabent." },
      { keyword: "flu", english: "I always catch a dangerous **flu**.", hungarian: "Mindig elkapok egy veszélyes influenzát." },
      { keyword: "disabled", english: "My right leg is **disabled** now.", hungarian: "A jobb lábam rokkant / mozgássérült most." },
      { keyword: "painful", english: "Every movement is very **painful**.", hungarian: "Minden mozdulat nagyon fájdalmas." },
      { keyword: "be sick", english: "I will **be sick** very soon.", hungarian: "Hamarosan rosszul leszek / hányni fogok nagyon hamar." },
      { keyword: "sore", english: "My throat is very **sore** today.", hungarian: "A torkom nagyon fájós / érzékeny ma." },
      { keyword: "deaf", english: "I am getting completely **deaf**.", hungarian: "Teljesen süketté válok." },
      { keyword: "blind", english: "My eyes are turning **blind**.", hungarian: "A szemeim vakká válnak." }
    ];

    let quizSequence = [];
    let currentQuizIndex = 0;
    let isRevealed = false;
    let synth = window.speechSynthesis;
    let flaggedCards = [];

    const quizBox = document.getElementById('quizBox');
    const resultBox = document.getElementById('resultBox');
    const quizHungarian = document.getElementById('quizHungarian');
    const quizEnglish = document.getElementById('quizEnglish');
    const cardDivider = document.getElementById('cardDivider');
    const englishContainer = document.getElementById('englishContainer');
    const tapToRevealText = document.getElementById('tapToRevealText');
    const actionRow = document.getElementById('actionRow');
    const reviewFlaggedBtn = document.getElementById('reviewFlaggedBtn');
    const questionProgress = document.getElementById('questionProgress');
    const flaggedCountDisplay = document.getElementById('flaggedCountDisplay');
    const finalScoreText = document.getElementById('finalScoreText');

    // Sötét mód
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    });

    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function initQuiz(onlyReviewMode = false) {
      if (onlyReviewMode && flaggedCards.length > 0) {
        quizSequence = shuffleArray(flaggedCards);
        flaggedCards = [];
      } else {
        quizSequence = shuffleArray(cards);
        flaggedCards = [];
      }

      currentQuizIndex = 0;
      updateFlaggedCounter();
      
      quizBox.style.display = 'flex';
      resultBox.classList.add('hidden');
      resultBox.classList.remove('flex');
      loadQuestion();
    }

    function loadQuestion() {
      isRevealed = false;
      
      // Rejtjük az angol válaszsávokat és gombokat
      cardDivider.style.display = 'none';
      englishContainer.style.display = 'none';
      actionRow.style.display = 'none';
      tapToRevealText.style.display = 'block';
      
      if (synth) synth.cancel();

      const currentCard = quizSequence[currentQuizIndex];
      questionProgress.textContent = `${currentQuizIndex + 1} / ${quizSequence.length} Mondat`;
      quizHungarian.textContent = currentCard.hungarian;
      
      // Az angol szövegből kiszedjük a csillagokat a tiszta megjelenítéshez
      quizEnglish.textContent = currentCard.english.replace(/\*\*/g, '');
    }

    // Kártyára kattintáskor megmutatjuk és felolvassuk
    window.revealAnswer = function() {
      if (isRevealed) return;
      isRevealed = true;

      tapToRevealText.style.display = 'none';
      cardDivider.style.display = 'block';
      englishContainer.style.display = 'block';
      actionRow.style.display = 'flex';

      // 🔊 Azonnali tiszta felolvasás
      if (synth) {
        const textToSpeak = quizSequence[currentQuizIndex].english.replace(/\*\*/g, '');
        const utterance = new SpeechSynthesisUtterance(textToSpeak);
        utterance.lang = 'en-US';
        utterance.rate = 0.8;
        synth.speak(utterance);
      }
    }

    // Visszajelzés kezelése (döcögős vagy sima)
    window.handleFeedback = function(isFlagged) {
      const currentCard = quizSequence[currentQuizIndex];
      
      if (isFlagged) {
        if (!flaggedCards.some(c => c.keyword === currentCard.keyword)) {
          flaggedCards.push(currentCard);
          updateFlaggedCounter();
        }
      }

      // Lépünk a következőre
      if (currentQuizIndex < quizSequence.length - 1) {
        currentQuizIndex++;
        loadQuestion();
      } else {
        showResults();
      }
    }

    function updateFlaggedCounter() {
      if (flaggedCards.length > 0) {
        flaggedCountDisplay.textContent = `Ismétlendő: ${flaggedCards.length}`;
        flaggedCountDisplay.classList.remove('hidden');
      } else {
        flaggedCountDisplay.classList.add('hidden');
      }
    }

    function showResults() {
      if (synth) synth.cancel();
      quizBox.style.display = 'none';
      actionRow.style.display = 'none';
      resultBox.classList.remove('hidden');
      resultBox.classList.add('flex');
      
      if (flaggedCards.length === 0) {
        finalScoreText.innerHTML = "🎯 <strong>Zseniális!</strong> Minden mondat pacekba ment elsőre, tiszta 100%!";
        reviewFlaggedBtn.classList.add('hidden');
      } else {
        finalScoreText.innerHTML = `Végigértél! Elmentettünk <strong class="text-amber-500 font-bold">${flaggedCards.length} darab</strong> olyan mondatot, amit még gyakorolni kell.`;
        reviewFlaggedBtn.textContent = `Csak a döcögősek (${flaggedCards.length}) 🎯`;
        reviewFlaggedBtn.classList.remove('hidden');
        reviewFlaggedBtn.classList.add('block');
      }
    }

    function restartQuiz(onlyReview = false) {
      initQuiz(onlyReview);
    }

    initQuiz();
  </script>
</body>
</html>
