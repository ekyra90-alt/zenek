<!DOCTYPE html>
<html>
<body>
    <h1>Hipochondria - Tanulás</h1>
    
    <audio id="zene" controls>
        <source src="Hipochondria.mp3" type="audio/mpeg">
    </audio>

    <br><br>
    <!-- Gombok a versszakokhoz -->
    <button onclick="loopRange(29, 43)">1. versszak (29-43 mp)</button>
    <button onclick="loopRange(43, 57)">2. versszak (43-57 mp)</button>
    <button onclick="clearLoop()">Ismétlés kikapcsolása</button>

    <script>
        var audio = document.getElementById("zene");
        var start, end;

        function loopRange(s, e) {
            start = s;
            end = e;
            audio.currentTime = start;
            audio.play();
        }

        audio.addEventListener('timeupdate', function() {
            if (end && audio.currentTime >= end) {
                audio.currentTime = start;
            }
        });

        function clearLoop() {
            end = null;
        }
    </script>
</body>
</html>
