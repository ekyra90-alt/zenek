```html
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanuló Lejátszó</title>
    <style>
        body { font-family: Arial, sans-serif; background: #fff; padding: 20px; max-width: 400px; margin: auto; }
        audio { width: 100%; margin-bottom: 20px; }
        .controls { display: grid; gap: 10px; margin-bottom: 20px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #ccc; background: #f9f9f9; }
        button.active { background: #000; color: #fff; }
        #lyrics-box { border-top: 2px solid #eee; padding-top: 20px; min-height: 100px; font-size: 18px; line-height: 1.5; color: #333; }
    </style>
</head>
<body>

    <h2>Hipochondria</h2>
    <audio id="zene" controls>
        <source src="Hipochondria.mp3" type="audio/mpeg">
    </audio>

    <div class="controls">
        <button onclick="setLoop(this, 29, 43, 'I check my body every hour.
I feel I lose my physical power.
I find a new problem every day,
The happy thoughts all go away.
')">1. Versszak</button>
        <button onclick="setLoop(this, 43, 59, 'I am terribly unwell tonight,
My face is completely white.
I suffer from a secret thing,
The church bells start to ring.
')">2. Versszak</button>
        <button onclick="clearLoop(this)">Minden szöveg megjelenítése</button>
    </div>

    <div id="lyrics-box">Válogass egy versszakot a tanuláshoz!</div>

    <script>
        const audio = document.getElementById("zene");
        const lyricsBox = document.getElementById("lyrics-box");
        let start, end;

        function setLoop(btn, s, e, text) {
            start = s; end = e;
            lyricsBox.innerText = text;
            audio.currentTime = start;
            audio.play();
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        audio.addEventListener('timeupdate', () => {
            if (end && audio.currentTime >= end) audio.currentTime = start;
        });

        function clearLoop(btn) {
            end = null;
            lyricsBox.innerText = "Itt a teljes dalszöveg jelenhet meg.";
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
