<!DOCTYPE html>
<html lang="hu" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angol Tanulókártyák</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f5f3ff',
              100: '#ede9fe',
              200: '#ddd6fe',
              500: '#8b5cf6',
              600: '#7c3aed',
              700: '#6d28d9',
            }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes pulse-ring {
      0% { transform: scale(0.95); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.5; }
      100% { transform: scale(0.95); opacity: 1; }
    }
    .pulse-active { animation: pulse-ring 2s infinite ease-in-out; }
    @keyframes pulse-mic {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.15); opacity: 1; }
    }
    .pulse-mic-active { animation: pulse-mic 1.5s infinite ease-in-out; }
  </style>
  <script src="adat.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-full flex flex-col transition-colors duration-300">

  <header class="border-b border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-950 py-4 px-6 sticky top-0 z-10 shadow-sm">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <div class="flex flex-wrap items-center gap-3">
        <span class="text-lg font-bold tracking-wide text-slate-800 dark:text-white">Angol Tanulókártyák</span>
        <a href="zene_lejatszo.html" class="text-xs bg-brand-100 dark:bg-brand-900 text-brand-700 dark:text-brand-300 px-3 py-1.5 rounded-xl font-bold hover:bg-brand-200 transition">➔ Váltás Zene Módra</a>
        <a href="teszt.html" class="text-xs bg-emerald-100 dark:bg-emerald-950 text-emerald-700 dark:text-emerald-300 px-3 py-1.5 rounded-xl font-bold hover:bg-emerald-200 transition">📝 Tudásellenőrző Teszt</a>
      </div>

      <button id="themeToggle" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition" aria-label="Sötét mód váltás">
        <svg id="themeDarkIcon" class="hidden h-5 w-5 text-slate-800" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
        <svg id="themeLightIcon" class="hidden h-5 w-5 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m2.828-9.9a5 5 0 117.072 0l-.707.707M16.243 17.657l-.707-.707" />
        </svg>
      </button>
    </div>
  </header>

  <main class="flex-1 max-w-4xl w-full mx-auto p-4 md:p-6 flex flex-col justify-center items-center gap-6">
    
    <div class="w-full max-w-2xl flex justify-between items-center text-sm font-medium text-slate-400 dark:text-slate-500">
      <span id="cardProgress">1 / 12</span>
      <div id="standardSettings" class="flex items-center gap-4">
        <label class="flex items-center gap-2 cursor-pointer select-none">
          <input type="checkbox" id="autoPlayToggle" class="rounded text-brand-600 focus:ring-brand-500 border-slate-300 dark:border-slate-700 dark:bg-slate-800" checked>
          <span>Automatikus lejátszás</span>
        </label>
      </div>
    </div>

    <div id="flashcard" class="w-full max-w-2xl bg-white dark:bg-slate-800 rounded-3xl shadow-xl shadow-slate-100/50 dark:shadow-none border border-slate-100 dark:border-slate-700/60 p-8 md:p-12 flex flex-col justify-between min-h-[280px] transition-all duration-300 relative overflow-hidden group cursor-pointer active:scale-[0.99] touch-pan-y">
      <div class="flex-1 flex flex-col justify-center space-y-6 my-auto">
        <div class="text-center">
          <p id="englishText" class="text-2xl md:text-3xl font-medium tracking-tight text-slate-950 dark:text-white leading-relaxed"></p>
        </div>
        <div class="w-full border-t border-slate-100 dark:border-slate-700/60 my-2"></div>
        <div class="text-center">
          <p id="hungarianText" class="text-xl md:text-2xl font-normal text-slate-600 dark:text-slate-300 leading-normal"></p>
        </div>
      </div>
    </div>

    <div id="guidedPanel" class="w-full max-w-2xl bg-brand-50 dark:bg-brand-950/20 border-2 border-brand-200 dark:border-brand-800/60 rounded-2xl p-6 hidden flex-col items-center gap-5 transition-all">
      <div class="flex items-center justify-between w-full border-b border-brand-100 dark:border-brand-900 pb-3">
        <span class="text-sm font-bold uppercase tracking-wider text-brand-600 dark:text-brand-400">Vezetett Mélytanulás</span>
        <div class="flex items-center gap-2">
          <button id="pauseGuidedBtn" class="flex items-center gap-1.5 text-xs font-bold px-3 py-1.5 rounded-lg bg-brand-200 dark:bg-brand-900/60 text-brand-700 dark:text-brand-300 hover:bg-brand-300 transition-all">
            <span id="pauseBtnIcon">⏸️</span> <span id="pauseBtnText">Szünet</span>
          </button>
          <button id="exitGuidedBtn" class="text-xs font-semibold px-3 py-1.5 rounded-lg bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 transition">Kilépés</button>
        </div>
      </div>

      <div class="w-full grid grid-cols-2 gap-4 my-1">
        <div id="phase1Card" class="bg-white dark:bg-slate-800 p-4 rounded-xl text-center space-y-2 transition-all">
          <span class="text-2xl">🎧</span>
          <p class="text-sm font-bold text-slate-700 dark:text-slate-300">1. Hallgasd meg</p>
          <div id="phase1Progress" class="text-xs font-semibold text-slate-400 dark:text-slate-500">Várás...</div>
        </div>
        <div id="phase2Card" class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-100 dark:border-slate-700 text-center space-y-2 transition-all">
          <span id="phase2Icon" class="text-2xl block">🗣️</span>
          <p class="text-sm font-bold text-slate-700 dark:text-slate-300">2. Mondd utánam</p>
          <div id="phase2Progress" class="text-xs font-semibold text-slate-400 dark:text-slate-500">Várás...</div>
        </div>
      </div>

      <div class="w-full bg-slate-200 dark:bg-slate-800 rounded-full h-2.5 overflow-hidden hidden" id="countdownBarContainer">
        <div id="countdownBar" class="bg-brand-500 h-full w-full transition-all duration-100 ease-linear"></div>
      </div>

      <div class="flex flex-wrap items-center justify-center gap-4 text-xs font-semibold text-slate-500 dark:text-slate-400 w-full">
        <div class="flex items-center gap-2 bg-white dark:bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-100 dark:border-slate-700/60">
          <span>Beszédsebesség:</span>
          <select id="guidedSpeedSelect" class="bg-transparent font-bold text-brand-600 dark:text-brand-400 focus:outline-none">
            <option value="0.6">0.6x</option> <option value="0.8" selected>0.8x</option> <option value="1.0">1.0x</option> <option value="1.2">1.2x</option> <option value="1.4">1.4x</option>
          </select>
        </div>
        <label class="flex items-center gap-2 cursor-pointer select-none bg-white dark:bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-100 dark:border-slate-700/60">
          <input type="checkbox" id="guidedAutoAdvanceToggle" class="rounded text-brand-600 focus:ring-brand-500 border-slate-300 dark:border-slate-700 dark:bg-slate-800">
          <span>Automatikus kártyaváltás</span>
        </label>
      </div>

      <div class="text-center w-full">
        <p id="guidedStatusText" class="text-base font-semibold text-brand-700 dark:text-brand-400">Program indítása...</p>
        <button id="nextGuidedCardBtn" class="mt-4 px-6 py-3 rounded-xl bg-brand-600 hover:bg-brand-700 text-white font-bold text-sm shadow-md shadow-brand-500/20 transition-all transform hover:scale-105 active:scale-95 hidden mx-auto">Tovább a következő kártyára ➔</button>
      </div>
    </div>

    <div id="standardControls" class="w-full max-w-2xl bg-white dark:bg-slate-800/80 backdrop-blur rounded-2xl border border-slate-100 dark:border-slate-700/60 p-6 flex flex-col md:flex-row items-center justify-between gap-6">
      <div class="flex items-center gap-3 w-full md:w-auto justify-start">
        <span class="text-xs font-semibold uppercase text-slate-400 dark:text-slate-500 whitespace-nowrap">Beszédsebesség:</span>
        <select id="speedSelect" class="bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-2.5 py-1.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-brand-500">
          <option value="0.6">0.6x (Lassú)</option> <option value="0.8" selected>0.8x</option> <option value="1.0">1.0x (Normál)</option> <option value="1.2">1.2x</option> <option value="1.4">1.4x (Gyors)</option>
        </select>
      </div>

      <div class="flex flex-wrap items-center gap-3 w-full md:w-auto justify-end">
        <button id="startGuidedBtn" class="flex flex-row items-center justify-center gap-2 px-5 py-3 rounded-xl bg-brand-600 hover:bg-brand-700 text-white font-bold text-sm shadow-md shadow-brand-500/20 transition-all transform hover:scale-[1.02] active:scale-95">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364.364l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.707.707M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z" /></svg>
          Irányított Tanulás
        </button>

        <button id="loopBtn" class="flex flex-row items-center justify-center gap-2 px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700/50 text-slate-600 dark:text-slate-300 transition-all font-semibold text-sm shadow-sm whitespace-nowrap">
          <svg id="loopIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px; min-width: 18px;" class="flex-shrink-0 transition-transform"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
          <span id="loopText" class="whitespace-nowrap">Ismétlés: Ki</span> <span id="loopDot" class="w-2 h-2 rounded-full bg-slate-300 dark:bg-slate-600 transition-colors flex-shrink-0"></span>
        </button>

        <button id="playBtn" class="relative flex items-center justify-center p-4 rounded-full bg-brand-600 hover:bg-brand-700 text-white shadow-lg shadow-brand-500/20 active:scale-95 transition-all">
          <span id="playPulseRing" class="absolute inset-0 rounded-full bg-brand-500/40 hidden"></span>
          <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 relative z-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="width: 24px; height: 24px; min-width: 24px;"><path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          <svg id="stopIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 relative z-10 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="width: 24px; height: 24px; min-width: 24px;"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M9 10a1 1 0 011-1 h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z" /></svg>
        </button>
      </div>
    </div>

    <div class="w-full max-w-2xl flex items-center justify-between gap-4">
      <button id="prevBtn" class="flex-1 flex items-center justify-center gap-2 px-6 py-3 rounded-2xl bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700/50 border border-slate-100 dark:border-slate-700/60 font-semibold shadow-sm transition active:scale-[0.98]"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px; min-width: 20px;"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>Előző</button>
      <button id="nextBtn" class="flex-1 flex items-center justify-center gap-2 px-6 py-3 rounded-2xl bg-brand-600 hover:bg-brand-700 text-white font-semibold shadow-md shadow-brand-500/10 transition active:scale-[0.98]">Következő<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px; min-width: 20px;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg></button>
    </div>

    <div id="quickNavContainer" class="w-full max-w-2xl space-y-3 mt-2">
      <div class="flex flex-wrap gap-2" id="quickNavGrid"></div>
    </div>
  </main>

  <script>
    // Az adatokat beégetve hagytuk, de fent beolvassuk az adat.js-t is a kompatibilitás miatt!
    const cards = [
      { keyword: "unwell", english: "I am terribly **unwell** tonight.", hungarian: "Szörnyen rosszul vagyok ma éjjel." },
      { keyword: "suffer from", english: "I **suffer from** a secret thing.", hungarian: "Egy titkos dologban szenvedek." },
      { keyword: "heart attack", english: "I think I have a **heart attack**.", hungarian: "Azt hiszem, szívrohamom van." },
      { keyword: "unhealthy", english: "My lifestyle is very **unhealthy**.", hungarian: "Az életmódom nagyon egészségtelen." },
      { keyword: "cancer", english: "This nasty **cancer** is inside.", hungarian: "Ez a félelmetes rák van odabent." },
      { keyword: "flu", english: "I always catch a dangerous **flu**.", hungarian: "Mindig elkapok egy veszélyes influenzát." },
      { keyword: "disabled", english: "My right leg is **disabled** now.", hungarian: "A jobb lábam rokkant / mozgássérült most." },
      { keyword: "painful", english: "Every movement is very **painful**.", hungarian: "Minden mozdulat nagyon fájdalmas." },
      { keyword: "be sick", english: "I will **be sick** very soon.", hungarian: "Hamarosan rosszul leszek / hányni fogok nagyon hamar." },
      { keyword: "sore", english: "My throat is very **sore** today.", hungarian: "A torkom nagyon fájós / érzékeny ma." },
      { keyword: "deaf", english: "I am getting completely **deaf**.", hungarian: "Teljesen süketté válok." },
      { keyword: "blind", english: "My eyes are turning **blind**.", hungarian: "A szemeim vakká válnak." }
    ];

    let currentIndex = 0; let isLooping = false; let isSpeaking = false;
    let synth = window.speechSynthesis; let currentUtterance = null; let loopTimeout = null;
    let guidedActive = false; let guidedPaused = false; let guidedStep = 1; let guidedSubStep = 'speaking';
    let guidedCount = 0; const maxGuidedCount = 5; let countdownInterval = null; let remainingTime = 0; let currentRepeatDuration = 0;

    const englishText = document.getElementById('englishText'); const hungarianText = document.getElementById('hungarianText');
    const cardProgress = document.getElementById('cardProgress'); const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn'); const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon'); const stopIcon = document.getElementById('stopIcon');
    const playPulseRing = document.getElementById('playPulseRing'); const loopBtn = document.getElementById('loopBtn');
    const loopIcon = document.getElementById('loopIcon'); const loopText = document.getElementById('loopText');
    const loopDot = document.getElementById('loopDot'); const speedSelect = document.getElementById('speedSelect');
    const autoPlayToggle = document.getElementById('autoPlayToggle'); const quickNavGrid = document.getElementById('quickNavGrid');
    const flashcard = document.getElementById('flashcard');

    const guidedPanel = document.getElementById('guidedPanel'); const standardControls = document.getElementById('standardControls');
    const standardSettings = document.getElementById('standardSettings'); const quickNavContainer = document.getElementById('quickNavContainer');
    const phase1Card = document.getElementById('phase1Card'); const phase2Card = document.getElementById('phase2Card');
    const phase2Icon = document.getElementById('phase2Icon'); const phase1Progress = document.getElementById('phase1Progress');
    const phase2Progress = document.getElementById('phase2Progress'); const guidedStatusText = document.getElementById('guidedStatusText');
    const countdownBarContainer = document.getElementById('countdownBarContainer'); const countdownBar = document.getElementById('countdownBar');
    const startGuidedBtn = document.getElementById('startGuidedBtn'); const exitGuidedBtn = document.getElementById('exitGuidedBtn');
    const pauseGuidedBtn = document.getElementById('pauseGuidedBtn'); const pauseBtnIcon = document.getElementById('pauseBtnIcon');
    const pauseBtnText = document.getElementById('pauseBtnText'); const nextGuidedCardBtn = document.getElementById('nextGuidedCardBtn');
    const guidedSpeedSelect = document.getElementById('guidedSpeedSelect'); const guidedAutoAdvanceToggle = document.getElementById('guidedAutoAdvanceToggle');

    const themeToggleBtn = document.getElementById('themeToggle'); const themeDarkIcon = document.getElementById('themeDarkIcon'); const themeLightIcon = document.getElementById('themeLightIcon');

    if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark'); themeLightIcon.classList.remove('hidden');
    } else {
      document.documentElement.classList.remove('dark'); themeDarkIcon.classList.remove('hidden');
    }

    themeToggleBtn.addEventListener('click', () => {
      if (document.documentElement.classList.contains('dark')) {
        document.documentElement.classList.remove('dark'); localStorage.setItem('color-theme', 'light'); themeLightIcon.classList.add('hidden'); themeDarkIcon.classList.remove('hidden');
      } else {
        document.documentElement.classList.add('dark'); localStorage.setItem('color-theme', 'dark'); themeDarkIcon.classList.add('hidden'); themeLightIcon.classList.remove('hidden');
      }
    });

    speedSelect.addEventListener('change', () => { guidedSpeedSelect.value = speedSelect.value; });
    guidedSpeedSelect.addEventListener('change', () => { speedSelect.value = guidedSpeedSelect.value; });

    function formatTextWithBold(text) {
      return text.replace(/\*\*(.*?)\*\*/g, (match, p1) => {
        return `<button onclick="speakKeywordOnly(event, '${p1}')" class="inline-flex items-center gap-1.5 px-3 py-1 mx-1 rounded-xl bg-brand-100 dark:bg-brand-900/40 text-brand-700 dark:text-brand-300 border border-brand-200 dark:border-brand-700/50 hover:bg-brand-200 dark:hover:bg-brand-800 transition-all font-extrabold cursor-pointer transform hover:scale-105 active:scale-95 flex-shrink-0">
          <span>${p1}</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-brand-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="width: 16px; height: 16px; min-width: 16px;"><path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
        </button>`;
      });
    }

    function cleanTextForSpeech(text) { return text.replace(/\*\//g, '').replace(/\*\*/g, ''); }

    function updateCard() {
      const card = cards[currentIndex];
      englishText.style.opacity = 0; hungarianText.style.opacity = 0;
      setTimeout(() => {
        englishText.innerHTML = formatTextWithBold(card.english); hungarianText.textContent = card.hungarian; englishText.style.opacity = 1; hungarianText.style.opacity = 1;
      }, 150);
      cardProgress.textContent = `${currentIndex + 1} / ${cards.length}`;
      prevBtn.disabled = currentIndex === 0; prevBtn.style.opacity = currentIndex === 0 ? '0.5' : '1';
      nextBtn.disabled = currentIndex === cards.length - 1; nextBtn.style.opacity = currentIndex === cards.length - 1 ? '0.5' : '1';
      updateQuickNavHighlight(); stopSpeech();
      if (guidedActive) { startGuidedSequence(); } else if (autoPlayToggle.checked) { setTimeout(() => { speakCurrent(); }, 300); }
    }

    function setupQuickNav() {
      quickNavGrid.innerHTML = '';
      cards.forEach((card, idx) => {
        const btn = document.createElement('button'); btn.textContent = card.keyword;
        btn.className = `px-3 py-1.5 rounded-xl text-xs font-semibold border transition-all active:scale-95 ${idx === currentIndex ? 'bg-brand-600 border-brand-600 text-white shadow-md shadow-brand-500/20' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300'}`;
        btn.addEventListener('click', () => { currentIndex = idx; updateCard(); });
        quickNavGrid.appendChild(btn);
      });
    }

    function updateQuickNavHighlight() {
      Array.from(quickNavGrid.children).forEach((btn, idx) => {
        if (idx === currentIndex) { btn.className = 'px-3 py-1.5 rounded-xl text-xs font-bold border transition-all bg-brand-600 border-brand-600 text-white shadow-md shadow-brand-500/20 scale-105'; }
        else { btn.className = 'px-3 py-1.5 rounded-xl text-xs font-semibold border transition-all bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50 text-slate-600 dark:text-slate-300'; }
      });
    }

    window.speakKeywordOnly = function(event, word) {
      if (event) event.stopPropagation();
      if (guidedActive && !guidedPaused) { togglePauseGuided(); } else if (!guidedActive) { stopSpeech(); } else { synth.cancel(); }
      if (!synth) return;
      const cleanWord = word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
      const utterance = new SpeechSynthesisUtterance(cleanWord); utterance.lang = 'en-US';
      const currentSpeed = guidedActive ? guidedSpeedSelect.value : speedSelect.value;
      utterance.rate = parseFloat(currentSpeed) || 1.0; synth.speak(utterance);
    }

    function speakCurrent() {
      if (!synth) return; stopSpeech();
      const rawText = cards[currentIndex].english; const textToSpeak = cleanTextForSpeech(rawText);
      currentUtterance = new SpeechSynthesisUtterance(textToSpeak); currentUtterance.lang = 'en-US'; currentUtterance.rate = parseFloat(speedSelect.value) || 1.0;
      currentUtterance.onstart = () => { isSpeaking = true; setPlayingUI(true); };
      currentUtterance.onend = () => { isSpeaking = false; setPlayingUI(false); if (isLooping) { loopTimeout = setTimeout(() => { speakCurrent(); }, 1200); } };
      currentUtterance.onerror = () => { isSpeaking = false; setPlayingUI(false); };
      synth.speak(currentUtterance);
    }

    function stopSpeech() {
      if (synth) synth.cancel();
      if (loopTimeout) { clearTimeout(loopTimeout); loopTimeout = null; }
      if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
      isSpeaking = false; setPlayingUI(false);
    }

    function setPlayingUI(playing) {
      if (playing) { playIcon.classList.add('hidden'); stopIcon.classList.remove('hidden'); playPulseRing.classList.remove('hidden'); playPulseRing.classList.add('pulse-active'); }
      else { playIcon.classList.remove('hidden'); stopIcon.classList.add('hidden'); playPulseRing.classList.add('hidden'); playPulseRing.classList.remove('pulse-active'); }
    }

    function playTransitionChime() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext; if (!AudioContext) return;
        const ctx = new AudioContext(); const now = ctx.currentTime;
        const osc1 = ctx.createOscillator(); const gain1 = ctx.createGain(); osc1.type = 'sine'; osc1.frequency.setValueAtTime(659.25, now); gain1.gain.setValueAtTime(0.12, now); gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.6); osc1.connect(gain1); gain1.connect(ctx.destination); osc1.start(now); osc1.stop(now + 0.6);
        const osc2 = ctx.createOscillator(); const gain2 = ctx.createGain(); osc2.type = 'sine'; osc2.frequency.setValueAtTime(880.00, now + 0.12); gain2.gain.setValueAtTime(0.12, now + 0.12); gain2.gain.exponentialRampToValueAtTime(0.001, now + 1.0); osc2.connect(gain2); gain2.connect(ctx.destination); osc2.start(now + 0.12); osc2.stop(now + 1.0);
      } catch (e) { console.log(e); }
    }

    function startGuidedMode() { guidedActive = true; guidedPaused = false; standardControls.classList.add('hidden'); standardSettings.classList.add('hidden'); quickNavContainer.classList.add('hidden'); guidedPanel.classList.remove('hidden'); startGuidedSequence(); }
    
    function startGuidedSequence() {
      stopSpeech(); guidedStep = 1; guidedSubStep = 'speaking'; guidedCount = 0; guidedPaused = false;
      pauseBtnIcon.textContent = "⏸️"; pauseBtnText.textContent = "Szünet";
      phase1Card.className = "p-4 rounded-xl text-center space-y-2 transition-all border bg-brand-100 dark:bg-brand-900/40 border-brand-300 dark:border-brand-700 shadow-md";
      phase2Card.className = "p-4 rounded-xl text-center space-y-2 transition-all border bg-white dark:bg-slate-800 border-slate-100 dark:border-slate-700 opacity-50";
      phase2Icon.classList.remove('pulse-mic-active'); phase1Progress.textContent = "0 / " + maxGuidedCount; phase2Progress.textContent = "0 / " + maxGuidedCount; countdownBarContainer.classList.add('hidden'); nextGuidedCardBtn.classList.add('hidden');
      runGuidedStep();
    }

    function runGuidedStep() {
      if (!guidedActive || guidedPaused) return;
      const card = cards[currentIndex]; const speechText = cleanTextForSpeech(card.english);
      if (guidedStep === 1) {
        guidedSubStep = 'speaking'; guidedStatusText.textContent = "🎧 Csak hallgasd a mondatot...";
        if (currentUtterance) { currentUtterance.onstart = null; currentUtterance.onend = null; currentUtterance.onerror = null; }
        currentUtterance = new SpeechSynthesisUtterance(speechText); currentUtterance.lang = 'en-US'; currentUtterance.rate = parseFloat(guidedSpeedSelect.value) || 1.0;
        currentUtterance.onstart = () => { phase1Progress.textContent = `${guidedCount + 1} / ${maxGuidedCount}`; };
        currentUtterance.onend = () => {
          if (guidedPaused) return; guidedCount++;
          if (guidedCount < maxGuidedCount) { loopTimeout = setTimeout(() => { runGuidedStep(); }, 1000); }
          else { guidedStatusText.textContent = "Nagyszerű! Most jön az ismétlés fázis..."; playTransitionChime(); loopTimeout = setTimeout(() => { guidedStep = 2; guidedCount = 0; phase1Card.className = "p-4 rounded-xl text-center space-y-2 transition-all border bg-white dark:bg-slate-800 border-slate-100 dark:border-slate-700 opacity-50"; phase2Card.className = "p-4 rounded-xl text-center space-y-2 transition-all border bg-brand-100 dark:bg-brand-900/40 border-brand-300 dark:border-brand-700 shadow-md"; phase2Progress.textContent = "0 / " + maxGuidedCount; runGuidedStep(); }, 1500); }
        };
        synth.speak(currentUtterance);
      } else if (guidedStep === 2) {
        guidedSubStep = 'speaking'; guidedStatusText.textContent = "🗣️ Figyelj, majd ismételd el!"; phase2Icon.classList.remove('pulse-mic-active'); countdownBarContainer.classList.add('hidden');
        if (currentUtterance) { currentUtterance.onstart = null; currentUtterance.onend = null; currentUtterance.onerror = null; }
        currentUtterance = new SpeechSynthesisUtterance(speechText); currentUtterance.lang = 'en-US'; currentUtterance.rate = parseFloat(guidedSpeedSelect.value) || 1.0;
        currentUtterance.onstart = () => { phase2Progress.textContent = `${guidedCount + 1} / ${maxGuidedCount}`; };
        currentUtterance.onend = () => {
          if (guidedPaused) return; guidedSubStep = 'waiting'; guidedStatusText.textContent = "🗣️ MOST TE JÖSSZ! Mondd hangosan utánam!"; phase2Icon.classList.add('pulse-mic-active'); countdownBarContainer.classList.remove('hidden');
          const wordCount = speechText.split(' ').length; currentRepeatDuration = Math.max(3000, (wordCount * 650) + 1800); remainingTime = currentRepeatDuration; startCountdown();
        };
        synth.speak(currentUtterance);
      }
    }

    function startCountdown() {
      if (countdownInterval) clearInterval(countdownInterval);
      countdownBar.style.width = `${(remainingTime / currentRepeatDuration) * 100}%`;
      const intervalStep = 100;
      countdownInterval = setInterval(() => {
        if (guidedPaused) { clearInterval(countdownInterval); return; }
        remainingTime -= intervalStep; const percentage = (remainingTime / currentRepeatDuration) * 100; countdownBar.style.width = `${percentage}%`;
        if (remainingTime <= 0) {
          clearInterval(countdownInterval); countdownInterval = null; phase2Icon.classList.remove('pulse-mic-active'); countdownBarContainer.classList.add('hidden'); guidedCount++;
          if (guidedCount < maxGuidedCount) { runGuidedStep(); }
          else {
            phase2Progress.textContent = "KÉSZ!";
            if (guidedAutoAdvanceToggle.checked) {
              guidedStatusText.textContent = "🏆 Kiváló! Továbblépés 3 másodperc múlva...";
              loopTimeout = setTimeout(() => { if (currentIndex < cards.length - 1) { currentIndex++; updateCard(); } else { guidedStatusText.textContent = "🏆 Gratulálok! Végigértél az összes kártyán!"; loopTimeout = setTimeout(() => { exitGuidedMode(); }, 4000); } }, 3000);
            } else { guidedStatusText.textContent = "🏆 Fantasztikus! Teljesítetted ezt a kártyát!"; nextGuidedCardBtn.classList.remove('hidden'); }
          }
        }
      }, intervalStep);
    }

    function togglePauseGuided() {
      if (!guidedActive) return;
      if (!guidedPaused) {
        guidedPaused = true; pauseBtnIcon.textContent = "▶️"; pauseBtnText.textContent = "Folytatás"; guidedStatusText.textContent = "⏸️ Irányított tanulás szüneteltetve.";
        if (guidedSubStep === 'speaking') { if (currentUtterance) { currentUtterance.onstart = null; currentUtterance.onend = null; currentUtterance.onerror = null; } synth.cancel(); }
        if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
        phase2Icon.classList.remove('pulse-mic-active'); if (loopTimeout) { clearTimeout(loopTimeout); loopTimeout = null; }
      } else {
        guidedPaused = false; pauseBtnIcon.textContent = "⏸️"; pauseBtnText.textContent = "Szünet";
        if (guidedStep === 1) { runGuidedStep(); } else if (guidedStep === 2) { if (guidedSubStep === 'waiting') { guidedStatusText.textContent = "🗣️ MOST TE JÖSSZ! Folytasd az utánamondást!"; phase2Icon.classList.add('pulse-mic-active'); startCountdown(); } else { runGuidedStep(); } }
      }
    }

    function exitGuidedMode() { guidedActive = false; guidedPaused = false; stopSpeech(); guidedPanel.classList.add('hidden'); standardControls.classList.remove('hidden'); standardSettings.classList.remove('hidden'); quickNavContainer.classList.remove('hidden'); updateCard(); }

    function toggleLoop() {
      isLooping = !isLooping;
      if (isLooping) {
        loopBtn.classList.remove('border-slate-200', 'dark:border-slate-700', 'bg-white', 'dark:bg-slate-800'); loopBtn.classList.add('border-brand-500', 'bg-brand-50', 'dark:bg-brand-900/20', 'text-brand-600', 'dark:text-brand-400', 'ring-2', 'ring-brand-500/20'); loopIcon.classList.add('rotate-180', 'text-brand-600', 'dark:text-brand-400'); loopText.textContent = "Ismétlés: Be"; loopDot.classList.remove('bg-slate-300', 'dark:bg-slate-600'); loopDot.classList.add('bg-brand-500', 'pulse-active');
        if (!isSpeaking) speakCurrent();
      } else {
        loopBtn.classList.add('border-slate-200', 'dark:border-slate-700', 'bg-white', 'dark:bg-slate-800'); loopBtn.classList.remove('border-brand-500', 'bg-brand-50', 'dark:bg-brand-900/20', 'text-brand-600', 'dark:text-brand-400', 'ring-2', 'ring-brand-500/20'); loopIcon.classList.remove('rotate-180', 'text-brand-600', 'dark:text-brand-400'); loopText.textContent = "Ismétlés: Ki"; loopDot.classList.remove('bg-brand-500', 'pulse-active'); loopDot.classList.add('bg-slate-300', 'dark:bg-slate-600');
        if (loopTimeout) { clearTimeout(loopTimeout); loopTimeout = null; }
      }
    }

    prevBtn.addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; updateCard(); } });
    nextBtn.addEventListener('click', () => { if (currentIndex < cards.length - 1) { currentIndex++; updateCard(); } });
    playBtn.addEventListener('click', (e) => { e.stopPropagation(); if (isSpeaking) { if (isLooping) toggleLoop(); stopSpeech(); } else { speakCurrent(); } });
    flashcard.addEventListener('click', () => { if (guidedActive) return; if (isSpeaking) stopSpeech(); else speakCurrent(); });
    loopBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleLoop(); });
    speedSelect.addEventListener('change', () => { if (guidedActive) { stopSpeech(); runGuidedStep(); } else if (isSpeaking) { speakCurrent(); } });
    startGuidedBtn.addEventListener('click', () => { startGuidedMode(); });
    exitGuidedBtn.addEventListener('click', () => { exitGuidedMode(); });
    pauseGuidedBtn.addEventListener('click', () => { togglePauseGuided(); });
    nextGuidedCardBtn.addEventListener('click', () => { if (currentIndex < cards.length - 1) { currentIndex++; updateCard(); } else { exitGuidedMode(); } });

    let touchStartX = 0; let touchEndX = 0;
    flashcard.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
    flashcard.addEventListener('touchend', (e) => { touchEndX = e.changedTouches[0].screenX; handleSwipe(); }, { passive: true });
    function handleSwipe() { if (guidedActive) return; const threshold = 50; if (touchStartX - touchEndX > threshold) { if (currentIndex < cards.length - 1) { currentIndex++; updateCard(); } } else if (touchEndX - touchStartX > threshold) { if (currentIndex > 0) { currentIndex--; updateCard(); } } }

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') { e.preventDefault(); if (guidedActive) togglePauseGuided(); else { if (isSpeaking) stopSpeech(); else speakCurrent(); } }
      else if (e.code === 'ArrowLeft') { if (guidedActive) return; if (currentIndex > 0) { currentIndex--; updateCard(); } }
      else if (e.code === 'ArrowRight') { if (guidedActive) return; if (currentIndex < cards.length - 1) { currentIndex++; updateCard(); } }
      else if (e.code === 'KeyL') { if (guidedActive) return; toggleLoop(); }
    });

    setupQuickNav(); updateCard();
  </script>
</body>
