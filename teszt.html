<!DOCTYPE html>
<html lang="hu" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angol Teszt & Ellenőrzés</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-full flex flex-col transition-colors duration-300">

  <header class="border-b border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-950 py-4 px-6 sticky top-0 z-10 shadow-sm">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="tanulo_kartyak.html" class="text-xs bg-slate-100 dark:bg-slate-800 text-slate-500 px-3 py-2 rounded-xl font-bold">❮ Vissza a Kártyákhoz</a>
        <span class="text-lg font-bold tracking-wide text-slate-800 dark:text-white">Tudásellenőrző Teszt</span>
      </div>
      
      <button id="themeToggle" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition">🌓</button>
    </div>
  </header>

  <main class="flex-1 max-w-2xl w-full mx-auto p-4 md:p-6 flex flex-col justify-center items-center gap-6">
    
    <div class="w-full flex justify-between items-center text-sm font-bold text-slate-400">
      <span id="questionProgress">1 / 12 Kérdés</span>
      <span id="scoreDisplay" class="text-brand-600 dark:text-brand-400">Pontszám: 0</span>
    </div>

    <div id="quizBox" class="w-full bg-white dark:bg-slate-800 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-700/60 p-8 md:p-10 flex flex-col gap-6 min-h-[300px] transition-all">
      
      <div class="text-center space-y-4">
        <p id="quizHungarian" class="text-sm font-semibold text-slate-400 uppercase tracking-wider"></p>
        <p id="quizEnglish" class="text-xl md:text-2xl font-bold tracking-tight text-slate-950 dark:text-white leading-relaxed"></p>
      </div>

      <div class="w-full border-t border-slate-100 dark:border-slate-700/60 my-2"></div>

      <div id="optionsGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full">
        </div>

      <button id="nextQuestionBtn" class="mt-4 w-full py-3.5 rounded-xl bg-brand-600 hover:bg-brand-700 text-white font-bold text-sm shadow-md transition-all hidden">
        Következő kérdés ➔
      </button>
    </div>

    <div id="resultBox" class="w-full bg-white dark:bg-slate-800 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-700/60 p-8 text-center hidden flex-col items-center gap-4">
      <span class="text-5xl">🏆</span>
      <h2 class="text-2xl font-black">Teszt befejezve!</h2>
      <p id="finalScoreText" class="text-lg font-medium text-slate-600 dark:text-slate-300"></p>
      <button onclick="restartQuiz()" class="mt-4 px-6 py-3 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-xl transition">
        Újrapróbálkozás 🔄
      </button>
    </div>

  </main>

  <script>
    const cards = [
      { keyword: "unwell", english: "I am terribly **unwell** tonight.", hungarian: "Szörnyen rosszul vagyok ma éjjel." },
      { keyword: "suffer from", english: "I **suffer from** a secret thing.", hungarian: "Egy titkos dologban szenvedek." },
      { keyword: "heart attack", english: "I think I have a **heart attack**.", hungarian: "Azt hiszem, szívrohamom van." },
      { keyword: "unhealthy", english: "My lifestyle is very **unhealthy**.", hungarian: "Az életmódom nagyon egészségtelen." },
      { keyword: "cancer", english: "This nasty **cancer** is inside.", hungarian: "Ez a félelmetes rák van odabent." },
      { keyword: "flu", english: "I always catch a dangerous **flu**.", hungarian: "Mindig elkapok egy veszélyes influenzát." },
      { keyword: "disabled", english: "My right leg is **disabled** now.", hungarian: "A jobb lábam rokkant / mozgássérült most." },
      { keyword: "painful", english: "Every movement is very **painful**.", hungarian: "Minden mozdulat nagyon fájdalmas." },
      { keyword: "be sick", english: "I will **be sick** very soon.", hungarian: "Hamarosan rosszul leszek / hányni fogok nagyon hamar." },
      { keyword: "sore", english: "My throat is very **sore** today.", hungarian: "A torkom nagyon fájós / érzékeny ma." },
      { keyword: "deaf", english: "I am getting completely **deaf**.", hungarian: "Teljesen süketté válok." },
      { keyword: "blind", english: "My eyes are turning **blind**.", hungarian: "A szemeim vakká válnak." }
    ];

    let quizSequence = [];
    let currentQuizIndex = 0;
    let score = 0;
    let hasAnswered = false;

    const quizBox = document.getElementById('quizBox');
    const resultBox = document.getElementById('resultBox');
    const quizHungarian = document.getElementById('quizHungarian');
    const quizEnglish = document.getElementById('quizEnglish');
    const optionsGrid = document.getElementById('optionsGrid');
    const nextQuestionBtn = document.getElementById('nextQuestionBtn');
    const questionProgress = document.getElementById('questionProgress');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const finalScoreText = document.getElementById('finalScoreText');

    // Sötét mód kezelő
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    });

    // Sorrend keverése (Fisher-Yates)
    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function initQuiz() {
      quizSequence = shuffleArray(cards);
      currentQuizIndex = 0;
      score = 0;
      hasAnswered = false;
      scoreDisplay.textContent = `Pontszám: ${score}`;
      quizBox.classList.remove('hidden');
      resultBox.classList.add('hidden');
      loadQuestion();
    }

    function loadQuestion() {
      hasAnswered = false;
      nextQuestionBtn.classList.add('hidden');
      optionsGrid.innerHTML = '';

      const currentCard = quizSequence[currentQuizIndex];
      questionProgress.textContent = `${currentQuizIndex + 1} / ${quizSequence.length} Kérdés`;
      quizHungarian.textContent = currentCard.hungarian;
      
      // Kicseréljük a vastagított részt egy jól látható üres helyre
      const blankSentence = currentCard.english.replace(/\*\*(.*?)\*\*/g, "_______");
      quizEnglish.textContent = blankSentence;

      // Opciók összeállítása: jó válasz + 3 véletlenszerű rossz válasz
      let options = [currentCard.keyword];
      const wrongPool = cards.filter(c => c.keyword !== currentCard.keyword).map(c => c.keyword);
      const shuffledWrong = shuffleArray(wrongPool);
      
      options.push(shuffledWrong[0], shuffledWrong[1], shuffledWrong[2]);
      options = shuffleArray(options); // Opciók összekeverése

      // Gombok legyártása
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.textContent = opt;
        btn.className = "py-3 px-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700/50 font-semibold text-sm transition-all text-center shadow-sm focus:outline-none active:scale-95";
        btn.addEventListener('click', () => checkAnswer(btn, opt, currentCard.keyword));
        optionsGrid.appendChild(btn);
      });
    }

    function checkAnswer(selectedBtn, chosenOpt, correctOpt) {
      if (hasAnswered) return;
      hasAnswered = true;

      const buttons = optionsGrid.querySelectorAll('button');
      buttons.forEach(btn => {
        btn.disabled = true; // Letiltjuk a többi gombot nyomkodás ellen
        // Ha ez a helyes válasz, bezöldítjük, hogy látszódjon hol volt
        if (btn.textContent === correctOpt) {
          btn.className = "py-3 px-4 rounded-xl border-2 border-emerald-500 bg-emerald-50 dark:bg-emerald-950/30 text-emerald-700 dark:text-emerald-400 font-bold text-sm text-center shadow-sm";
        }
      });

      if (chosenOpt === correctOpt) {
        score++;
        scoreDisplay.textContent = `Pontszám: ${score}`;
        selectedBtn.className = "py-3 px-4 rounded-xl border-2 border-emerald-500 bg-emerald-50 dark:bg-emerald-950/30 text-emerald-700 dark:text-emerald-400 font-bold text-sm text-center shadow-md scale-[1.02]";
      } else {
        selectedBtn.className = "py-3 px-4 rounded-xl border-2 border-rose-500 bg-rose-50 dark:bg-rose-950/30 text-rose-700 dark:text-rose-400 font-bold text-sm text-center shadow-md scale-[1.02]";
      }

      nextQuestionBtn.classList.remove('hidden');
    }

    nextQuestionBtn.addEventListener('click', () => {
      if (currentQuizIndex < quizSequence.length - 1) {
        currentQuizIndex++;
        loadQuestion();
      } else {
        showResults();
      }
    });

    function showResults() {
      quizBox.classList.add('hidden');
      resultBox.classList.remove('hidden');
      resultBox.classList.add('flex');
      
      let message = "";
      if (score === quizSequence.length) message = "Zseniális vagy! 100%-os teljesítmény! 🥳";
      else if (score >= 9) message = "Nagyon profi! Pár apró tévesztés csak. 👌";
      else if (score >= 6) message = "Alakul ez, de érdemes még pörgetni a kártyákat! 📚";
      else message = "Ne csüggedj, a mélytanulás mód segíteni fog! 💪";

      finalScoreText.innerHTML = `Elért pontszám: <strong class="text-brand-600 dark:text-brand-400 text-xl">${score} / ${quizSequence.length}</strong><br><span class="text-sm mt-2 block text-slate-400">${message}</span>`;
    }

    function restartQuiz() {
      initQuiz();
    }

    // Első indítás
    initQuiz();
  </script>
</body>
</html>
