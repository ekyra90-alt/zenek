```html
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Tanuló Lejátszó</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        .controls { display: grid; gap: 10px; margin-bottom: 20px; }
        button { padding: 10px; cursor: pointer; }
        #lyrics-box { border-top: 2px solid #ccc; padding-top: 20px; font-size: 18px; }
    </style>
</head>
<body>

    <h2>Hipochondria</h2>
    <audio id="zene" controls>
        <source src="Hipochondria.mp3" type="audio/mpeg">
    </audio>

    <div class="controls">
        <!-- Itt használd a ` jeleket az idézőjelek helyett -->
        <button onclick="setLoop(this, 29, 43, `I check my body every hour.
I feel I lose my physical power.
I find a new problem every day,
The happy thoughts all go away.`)">1. Versszak</button>
        <button onclick="setLoop(this, 43, 57, `I am terribly unwell tonight,
My face is completely white.
I suffer from a secret thing,
The church bells start to ring.`)">2. Versszak</button>
        <button onclick="clearLoop(this)">Szöveg alaphelyzetbe</button>
    </div>

    <div id="lyrics-box">Válassz egy részt a kezdéshez!</div>

    <script>
        const audio = document.getElementById("zene");
        const lyricsBox = document.getElementById("lyrics-box");
        let start, end;

        function setLoop(btn, s, e, text) {
            start = s; end = e;
            lyricsBox.innerText = text;
            audio.currentTime = start;
            audio.play();
        }

        audio.addEventListener('timeupdate', () => {
            if (end && audio.currentTime >= end) audio.currentTime = start;
        });

        function clearLoop(btn) {
            end = null;
            lyricsBox.innerText = "Válassz egy részt a kezdéshez!";
        }
    </script>
</body>
</html>
